    content: "# Quickstart\n\nComplete walkthrough from clone to working voice demo.\n\
      \n## Prerequisites\n\nBefore starting, ensure you have:\n\n- [Bun](https://bun.sh)\
      \ installed (recommended) or Node.js with npm/yarn\n- [Docker](https://docker.com)\
      \ and Docker Compose\n- API keys from [Deepgram](https://deepgram.com) (speech-to-text)\
      \ and either [Groq](https://groq.com) or [OpenRouter](https://openrouter.ai)\
      \ (LLM)\n\n## Step-by-Step Setup\n\n### 1. Clone the Repository\n\n[code example]\n\
      \nThe stack includes submodules for Core, Engine, Client SDK, and demos:\n\n\
      [code example]\n\n### 2. Install Dependencies\n\nInstall dependencies for all\
      \ workspaces:\n\n[code example]\n\n### 3. Build Client and UI Assets\n\nBuild\
      \ the Client SDK and Core UI assets before starting the stack:\n\n[code example]\n\
      \n### 4. Copy Environment Template\n\nCreate your environment file from the\
      \ example template:\n\n[code example]\n\n### 5. Configure Required Variables\n\
      \nEdit .env and configure the following:\n\n| Variable | Description | How to\
      \ Set |\n|----------|-------------|------------|\n| DEEPGRAM_API_KEY | Speech-to-text\
      \ API key | Get from [deepgram.com](https://deepgram.com) |\n| LLM_PROVIDER\
      \ | Choose groq or openrouter | Set provider name |\n| GROQ_API_KEY or OPENROUTER_API_KEY\
      \ | LLM API key | Get from your chosen provider |\n| VAD_PROVIDER | Voice activity\
      \ detection | Set to none if using Deepgram Nova-3 (has built-in VAD) |\n| VAD_ENABLED\
      \ | Enable/disable VAD | Set to false when using Deepgram Nova-3 |\n| ENCRYPTION_KEY\
      \ | Encryption for sensitive data | Generate a secure random string |\n| ENGINE_API_KEY\
      \ | Engine authentication | Generate a secure random string |\n| JWT_SECRET\
      \ | Token signing secret | Generate a secure random string |\n| CORE_BOOTSTRAP_PUBLISHABLE_KEY\
      \ | Bootstrap API key | Generate a secure random string |\n\n**Security key\
      \ generation tip:** Use a secure random generator for all keys (64+ character\
      \ hex strings recommended).\n\n### 6. Start the Stack\n\nStart all services\
      \ with Docker Compose:\n\n[code example]\n\nThis builds and starts Core (token\
      \ service + Web UI) and the Realtime Engine (WebSocket voice server).\n\nServices\
      \ will be available at:\n- **Core**: http://localhost:3000 (token service, Web\
      \ UI)\n- **Engine**: ws://localhost:8787/v1/realtime (WebSocket for voice)\n\
      \n### 7. Create an App and API Key in Core UI\n\n1. Open the Core UI at http://localhost:3000\n\
      2. Navigate to **Apps** and click **\"Create app\"**\n   - Give your app a name\
      \ (e.g., \"Local Stack App\")\n   - Save to create the app\n3. Create a publishable\
      \ key:\n   - Click **\"Manage keys\"** on your new app\n   - Click **\"Create\
      \ key\"**\n   - Add a label for the key\n   - Select **\"Generate session tokens\"\
      ** scope\n   - Select **\"Vowel Engine\"** as an allowed provider\n   - Click\
      \ **Create**\n4. Copy the key (starts with vkey_) - you'll need it for the demo\
      \ configuration\n5. Also copy the **App ID** displayed in the app details\n\n\
      ### 8. Validate Setup via Test Lab\n\nBefore integrating your own application,\
      \ verify the stack works:\n\n1. In Core UI, navigate to **Test Lab** (left sidebar)\n\
      2. Click **\"Generate and inspect token\"** to create a sample token\n3. Scroll\
      \ to **Live validation client**\n4. Click the microphone icon, allow browser\
      \ permissions, and speak (e.g., \"Hello, can you hear me?\")\n5. Verify transcript\
      \ appears and AI responds - this confirms the full pipeline works\n\n### 9.\
      \ Configure Demo Environment\n\nTo run the included e-commerce demo application:\n\
      \n[code example]\n\nReplace:\n- vkey_your-64-char-hex-key-here with your publishable\
      \ key from step 7\n- your-app-id-from-core-ui with your app ID from step 7\n\
      \n### 10. Start the Demo\n\nLaunch the demo development server:\n\n[code example]\n\
      \nOpen the provided localhost URL (e.g., http://localhost:3902) in your browser.\
      \ Click the microphone and speak to test real-time voice interaction with the\
      \ demo e-commerce application.\n\n## Next Steps\n\n- **[Architecture](./architecture)**\
      \ - Understand how the components work together\n- **[Configuration](./configuration)**\
      \ - Complete environment variable reference\n- **[Core](./core)** - Token service\
      \ API details\n- **[Realtime Engine](./engine)** - WebSocket API and events\n\
      - **[Troubleshooting](./troubleshooting)** - Debug common issues"
