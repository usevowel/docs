      \ validates tool calls\n- **EngineConnection**: Handles WebSocket communication\
      \ with the engine\n- **Scenarios**: Pre-defined test cases with objectives and\
      \ expected tool calls\n\n### Key Features\n\n- **Automated Conversation Flow**:\
      \ The TestDriver carries natural conversations toward test objectives\n- **Tool\
