    url_path: /guide/actions/
    content: '# Actions


      Actions are custom voice commands that you define for your application. They
      allow the AI to perform business logic specific to your app.


      ## ⚠️ CRITICAL: Action Registration Timing


      **All custom actions MUST be registered BEFORE starting the voice session!**


      [code example]


      **Why?** Tool definitions are sent to the server during session initialization.
      Actions registered after startSession() are not sent to the AI and will never
      be called.


      **Best Practice:** Always register all actions immediately after creating the
      Vowel client and before calling startSession().


      ## Overview


      When you register an action, the AI can:

      - Understand when to call it based on user voice input

      - Extract parameters from natural language

      - Execute your handler function

      - Return results to continue the conversation


