    content: '# Event Notifications


      Event notifications allow you to programmatically trigger AI voice responses
      for application events, without requiring user voice input.


      ## Overview


      Use event notifications to make the AI speak about:

      - Order confirmations

      - Timer expiry

      - New messages

      - System alerts

      - Status updates

      - Form submissions

      - Any application event


