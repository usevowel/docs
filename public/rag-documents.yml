    title: Audio Capture Config
    description: null
    category: Api
    url_path: /api/reference/index/variables/AUDIO_CAPTURE_CONFIG/
    content: '[**@vowel.to/client v0.3.3-beta**](../../index.md)


      ***


      [@vowel.to/client](../../index.md) / [index](../index.md) / AUDIO\_CAPTURE\_CONFIG


      # Variable: AUDIO\_CAPTURE\_CONFIG


      [code example]


      Defined in: [lib/vowel/types/constants.ts:55](https://github.com/usevowel/client/blob/2fa202a5fcaf88635eb502cf85e693ea06287317/lib/vowel/types/constants.ts#L55)


      Audio capture chunking configuration for microphone streaming.


      Controls how audio is buffered and sent to the server. Smaller chunks =

      more frequent sends, lower latency, better responsiveness for short phrases

      (e.g. "yes", "no", "okay"). Larger chunks = fewer sends, slightly less overhead.


      ## Type Declaration


      | Name | Type | Default value | Description | Defined in |

      | ------ | ------ | ------ | ------ | ------ |

      | bufferSize | 2048 | 2048 | Number of samples to accumulate before sending
      each audio chunk. At 24kHz: 2048 samples ≈ 85ms, 4096 samples ≈ 170ms. - **2048**
      (default): Smaller chunks, ~2x more frequent. Matches Vowel Engine demo behavior
      at 48kHz input. Better for short phrases and server VAD. - **4096**: Larger
      chunks, original behavior. Slightly less overhead. | [lib/vowel/types/constants.ts:64](https://github.com/usevowel/client/blob/2fa202a5fcaf88635eb502cf85e693ea06287317/lib/vowel/types/constants.ts#L64)
      |


      ## See


      AUDIO_CAPTURE_CONFIG.bufferSize - Samples per chunk at output sample rate (24kHz)'
    word_count: 159
    char_count: 1385
