    content: "# Self-Hosted Troubleshooting\n\nUse this page to narrow down the most\
      \ common self-hosted failures and debug issues with practical commands.\n\n\
      ## Quick Troubleshooting\n\n| Issue | Solution |\n|-------|----------|\n| Build\
      \ fails / dist/ not found | Run bun run build before docker compose up |\n|\
      \ Docker cache issues | docker builder prune -f && docker compose build --no-cache\
      \ |\n| Token generation fails | Verify API key has \"Generate session tokens\"\
      \ scope in Core UI |\n| Services won't connect | Check docker compose ps to\
      \ ensure all containers are healthy |\n| GPU not detected | Verify nvidia-smi\
      \ works on host and NVIDIA Container Toolkit is installed |\n\nFor detailed\
      \ troubleshooting, see the sections below.\n\n## Quick Diagnostic Commands\n\
      \n### Check Service Health\n\n[code example]\n\n### View Service Logs\n\n[code\
      \ example]\n\n### Check Container Status\n\n[code example]\n\n## Token Issuance\
      \ Fails\n\n### Diagnostic Steps\n\n1. **Check Core is running:**\n   [code example]\n\
      \n2. **Verify required secrets are set:**\n   [code example]\n\n3. **Test token\
      \ endpoint directly:**\n   [code example]\n\n4. **Check Core logs for errors:**\n\
      \   [code example]\n\n### Common Causes and Solutions\n\n| Symptom | Cause |\
      \ Solution |\n|---------|-------|----------|\n| 401 Unauthorized | Invalid or\
      \ missing API key | Verify X-API-Key header matches CORE_BOOTSTRAP_PUBLISHABLE_KEY\
      \ |\n| 500 Internal Server | Missing ENCRYPTION_KEY | Add ENCRYPTION_KEY to\
      \ stack.env and restart |\n| 404 Not Found | Wrong endpoint URL | Use POST /vowel/api/generateToken\
      \ |\n| Empty response | Core not healthy | Check curl http://localhost:3000/health\
      \ |\n\n## Realtime Connection Fails\n\n### Diagnostic Steps\n\n1. **Check WebSocket\
      \ endpoint is reachable:**\n   [code example]\n\n2. **Verify token validity:**\n\
      \   [code example]\n\n3. **Check token expiration:**\n   [code example]\n\n\
      4. **Check engine logs:**\n   [code example]\n\n### Common Causes and Solutions\n\
      \n| Symptom | Cause | Solution |\n|---------|-------|----------|\n| Connection\
      \ refused | Engine not running | Check docker ps and bun run stack:logs |\n\
      | 401 on WebSocket | Invalid/expired token | Generate new token from Core |\n\
      | 403 Forbidden | Wrong environment | Verify token was minted for correct engine\
      \ |\n| TLS error | HTTPS required | Use WSS:// in production, or set NODE_ENV=development\
      \ |\n| Proxy 502 error | WebSocket not forwarded | Configure proxy to forward\
      \ Upgrade headers |\n\n## Browser Microphone Issues\n\n### Diagnostic Steps\n\
      \n1. **Check HTTPS (required for microphone):**\n   [code example]\n\n2. **Verify\
      \ microphone permissions in browser:**\n   - Chrome: Click lock icon in address\
      \ bar → Site settings → Microphone\n   - Firefox: Click lock icon → Permissions\
      \ → Microphone\n\n3. **Test microphone availability:**\n   [code example]\n\n\
      4. **Check browser console for errors:**\n   - Look for NotAllowedError (permission\
      \ denied)\n   - Look for NotFoundError (no microphone)\n   - Look for WebSocket\
      \ connection errors\n\n### Common Causes and Solutions\n\n| Symptom | Cause\
      \ | Solution |\n|---------|-------|----------|\n| NotAllowedError | Permission\
      \ denied | Grant microphone permission in browser settings |\n| NotFoundError\
      \ | No microphone detected | Connect microphone and refresh |\n| Silence after\
      \ connecting | VAD not detecting speech | Check VAD_ENABLED=true and speak clearly\
      \ |\n| No audio output | TTS misconfigured | Verify DEEPGRAM_API_KEY and TTS\
      \ model |\n\n## Provider Misconfiguration\n\n### Diagnostic Steps\n\n1. **Check\
      \ provider credentials in environment:**\n   [code example]\n\n2. **Test provider\
      \ directly:**\n   [code example]\n\n3. **Check engine logs for provider errors:**\n\
      \   [code example]\n\n4. **Verify model names:**\n   [code example]\n\n### Common\
      \ Causes and Solutions\n\n| Symptom | Cause | Solution |\n|---------|-------|----------|\n\
      | 401 Unauthorized from provider | Invalid API key | Regenerate key from provider\
      \ console |\n| 404 Model not found | Invalid model ID | Check provider docs\
      \ for correct model string |\n| 429 Rate limited | Quota exceeded | Check provider\
      \ usage dashboard |\n| 500 Provider error | Provider outage | Check provider\
      \ status page |\n| STT returns empty | Audio format issue | Verify PCM16, 24kHz,\
      \ mono format |\n\n## Port, Host, Or Proxy Issues\n\n### Diagnostic Steps\n\n\
      1. **Check ports are not in use:**\n   [code example]\n\n2. **Test with custom\
      \ ports:**\n   [code example]\n\n3. **Check reverse proxy configuration:**\n\
      \   [code example]\n\n4. **Verify proxy forwards Upgrade headers:**\n   [code\
      \ example]\n\n### Common Causes and Solutions\n\n| Symptom | Cause | Solution\
      \ |\n|---------|-------|----------|\n| bind: address already in use | Port conflict\
      \ | Use CORE_HOST_PORT/ENGINE_HOST_PORT to change ports |\n| WebSocket closes\
      \ immediately | Proxy drops Upgrade | Configure proxy to forward WebSocket headers\
      \ |\n| 502 Bad Gateway | Proxy can't reach service | Check service is running\
      \ and proxy target is correct |\n| CORS errors | Origin not allowed | Configure\
