  self-hosted/index:
    title: Self Hosted
    description: null
    category: Getting Started
    url_path: /self-hosted/
    content: "# Self-Hosted\n\nSelf-hosted deployment lets you run vowel on infrastructure\
      \ you control.\n\n::: warning Beta Release\nThis open-source release is in beta.\
      \ You may encounter rough edges, incomplete features, or breaking changes. We\
      \ are actively reviewing and merging community PRs, but please expect some instability\
      \ as we iterate toward a stable release. Your feedback and contributions are\
      \ welcome.\n:::\n\n## Who This Is For\n\nChoose self-hosted when you want:\n\
      \n- Your own deployment boundary\n- Your own token issuance path\n- Custom networking,\
      \ auth, or backend policy\n- Operator control over runtime configuration\n-\
      \ Data privacy with fully offline operation (optional)\n\n  <img src=\"/images/self-host.png\"\
      \ alt=\"Self-Hosted Stack Overview\" style=\"width: 100%; display: block; border-radius:\
      \ 8px;\">\n  \n    \n  </div>\n</a>\n\n## What The Self-Hosted Stack Includes\n\
      \nThe self-hosted stack includes these services:\n\n| Service | Default URL\
      \ | Purpose |\n|---------|-------------|---------|\n| **Core** | http://localhost:3000\
      \ | Token issuance, app management, Web UI |\n| **Realtime Engine** | ws://localhost:8787/v1/realtime\
      \ | Voice AI WebSocket (OpenAI-compatible) |\n| **Echoline** (optional) | http://localhost:8000\
      \ | Self-hosted STT/TTS with faster-whisper + Kokoro |\n\n**Optional:**\n\n\
      | Service | Default URL | Purpose |\n|---------|-------------|---------|\n|\
      \ **Echoline** | http://localhost:8000 | Self-hosted STT/TTS (no external APIs)\
      \ |\n\nYour application typically talks to Core or your own backend to get a\
      \ token, then connects to the realtime engine with that token.\n\n## Deployment\
      \ Options\n\n### Option 1: Deepgram-Powered (Default - Recommended)\nUses hosted\
      \ STT/TTS from Deepgram. Works on all machines (no GPU required).\n\n- **Pros**:\
      \ Fast setup, professional-grade quality, no model downloads\n- **Cons**: Requires\
      \ Deepgram API key, ongoing API costs\n- **Requirements**: Deepgram API key\
      \ + LLM provider key (Groq or OpenRouter)\n- **Command**: bun run stack:up\n\
      \n### Option 2: Fully Self-Hosted with Echoline\nLocal speech processing with\
      \ faster-whisper + Kokoro. Requires NVIDIA GPU.\n\n- **Pros**: No external APIs,\
      \ data privacy, works offline, no API costs\n- **Cons**: Requires GPU, ~5GB\
      \ disk space, slower initial startup\n- **Requirements**: NVIDIA GPU with 8GB+\
      \ VRAM\n- **Command**: bun run stack:up:full\n\n### Option 3: GPU-Accelerated\
      \ (NVIDIA GPU Only)\nUses GPU for lower VAD latency with Deepgram quality.\n\
      \n- **Requirements**: NVIDIA GPU + Container Toolkit\n- **Command**: bun run\
      \ stack:up:gpu\n\n## Command Reference\n\nCommon stack management commands:\n\
      \n| Command | Description |\n|---------|-------------|\n| bun run stack:up |\
      \ Start CPU stack (default) |\n| bun run stack:up:gpu | Start with GPU acceleration\
      \ |\n| bun run stack:up:full | Start with Echoline (self-hosted STT/TTS) |\n\
      | bun run stack:down | Stop and remove containers |\n| bun run stack:logs |\
      \ View service logs |\n| bun run stack:build | Rebuild container images |\n\
      | bun run stack:test | Run smoke tests |\n\n## Hosted Vs Self-Hosted\n\nUse\
      \ the **hosted platform** if you want:\n\n- The fastest path to integration\n\
      - Managed app configuration\n- Platform-managed setup with appId\n\nUse **self-hosted**\
      \ if you want:\n\n- Infrastructure control\n- Your own token and networking\
      \ boundaries\n- Custom backend mediation for session access\n\n## Required API\
      \ Keys\n\nBefore deploying, obtain API keys from:\n\n| Provider | Purpose |\
      \ Where to Get |\n|----------|---------|--------------|\n| **Deepgram** | Speech-to-text\
      \ and text-to-speech | [deepgram.com](https://deepgram.com) |\n| **Groq** or\
      \ **OpenRouter** | LLM for AI responses | [groq.com](https://groq.com) or [openrouter.ai](https://openrouter.ai)\
      \ |\n\n### Fully Self-Hosted (No External Speech APIs)\n\nIf you run Echoline\
      \ for self-hosted STT/TTS, you can eliminate the Deepgram dependency:\n\n[code\
      \ example]\n\nEcholine requires a GPU for real-time performance. See [Self-Hosted\
      \ Speech](./echoline) for setup instructions.\n\nEcholine (self-hosted STT/TTS\
      \ option) does not require external API keys.\n\n## Testing\n\nThe stack includes\
      \ multiple testing capabilities:\n\n**Smoke Test** (bun run stack:test)\nA quick\
      \ health check that verifies the Core and Engine services are running, validates\
      \ token generation works, and confirms WebSocket connections can be established.\n\
      \n**Test Harness Framework**\nAn LLM-powered automated testing system in the\
      \ Engine that simulates human users conducting conversations with your voice\
      \ agent. It validates that the agent correctly uses tools, handles multi-turn\
      \ conversations, and maintains context across interactions. The framework includes\
      \ built-in test scenarios for weather lookups, calculations, multi-tool conversations,\
      \ and context retention.\n\n**Custom Test Scenarios**\nCreate your own test\
      \ cases by defining conversation objectives, expected tool calls with validation\
      \ logic, and mock return data. Tests can be run against different LLM providers\
      \ and generate detailed Markdown logs of each run.\n\nSee the **[Testing](./testing)**\
      \ page for detailed documentation on the Test Harness, creating custom scenarios,\
      \ and CI/CD integration.\n\n## Documentation\n\n- **[Deployment](./deployment)**\
      \ - Docker Compose setup, prerequisites, production deployment\n- **[Configuration](./configuration)**\
      \ - Complete environment variable reference\n- **[Core](./core)** - Token service\
      \ API, bootstrap process, Web UI\n- **[Realtime Engine](./engine)** - WebSocket\
      \ API, events, runtime config\n- **[Self-Hosted Speech (Echoline)](./echoline)**\
      \ - Run local STT/TTS without external APIs\n- **[Architecture](./architecture)**\
      \ - How components fit together\n- **[Testing](./testing)** - Smoke tests, Test\
      \ Harness framework, custom scenarios\n- **[Troubleshooting](./troubleshooting)**\
      \ - Debug common issues, logs, health checks\n\n## Source Repository\n\nThe\
      \ self-hosted stack is open source at [github.com/usevowel/stack](https://github.com/usevowel/stack).\n\
      \nIndividual components:\n- Core: [github.com/usevowel/core](https://github.com/usevowel/core)\n\
      - Engine: [github.com/usevowel/engine](https://github.com/usevowel/engine)"
    word_count: 805
    char_count: 6002
