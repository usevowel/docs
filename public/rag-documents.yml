  vowelbot/index:
    title: Vowelbot
    description: null
    category: Getting Started
    url_path: /vowelbot/
    content: "# vowelbot\n\n  <img src=\"/images/vowelbot.png\" alt=\"vowelbot - Auto-implement\
      \ AI voice\" style=\"width: 100%; display: block; border-radius: 8px;\">\n \
      \ \n    \n  </div>\n</a>\n\n[**vowelbot**](https://vowel.to/vowelbot) is a GitHub-integrated\
      \ service that adds voice agent capabilities to web projects (React, vanilla\
      \ JavaScript, or Web Components) via GitHub comments. Click the image above\
      \ to watch the demo video.\n\nUse vowelbot to add vowel to a GitHub repository\
      \ with an **automatic** onboarding flow at [add.vowel.to](https://add.vowel.to).\
      \ Just click a button — the integration runs entirely in an isolated branch,\
      \ leaving your existing work pristine.\n\n## Supported Projects\n\n- **Supported:**\
      \ React, vanilla JavaScript, Web Components (web projects only)\n- **Not yet\
      \ supported:** iOS Swift, Android, Flutter, and other non-web frameworks\n\n\
      ## Quick Start\n\n### 1. API Keys (Optional)\n\nvowelbot uses **[OpenCode](https://opencode.ai/)\
      \ directly inside the GitHub action** — no setup required! The integration automatically\
      \ uses high-quality free models (Minimax M2.5, Big Pickle, or Kimi K2.5).\n\n\
      **Want premium models?** Add one of these as a GitHub secret:\n\n| Secret name\
      \ | Where to get it |\n|-------------|-----------------|\n| ANTHROPIC_API_KEY\
      \ | [console.anthropic.com](https://console.anthropic.com) — Claude models |\n\
      | OPENAI_API_KEY | [platform.openai.com](https://platform.openai.com) — GPT\
      \ models |\n| GROQ_API_KEY | [console.groq.com](https://console.groq.com) —\
      \ Fast Llama models |\n| OPENCODE_API_KEY | [opencode.ai/zen](https://opencode.ai/zen)\
      \ — Use paid models with OpenCode credits |\n\n**Where to add secrets:**\n\n\
      - **Organization:** Org → Settings → Secrets and variables → Actions → New organization\
      \ secret\n- **Single repo:** Repo → Settings → Secrets and variables → Actions\
      \ → New repository secret\n\n**Note:** If you add any API key, vowelbot will\
      \ use that provider instead of the free [OpenCode](https://opencode.ai/) models.\n\
      \n### 2. Integrate — One Click\n\nGo to **[add.vowel.to](https://add.vowel.to)**\
      \ and click **Add vowel to your project**. Choose the repo you want to integrate\
      \ vowel into.\n\nThat's it. The workflow is added to your repo, the first integration\
      \ runs automatically, and OpenCode opens a PR with voice agent changes tailored\
      \ to your stack (React, vanilla JS, or <vowel-voice-widget>). Everything runs\
      \ in one go — no manual re-run needed.\n\n**Your existing code stays untouched.**\
      \ The integration uses [agent skills from the vowel repository](https://github.com/usevowel/skills/tree/main/skills)\
      \ — [vowel-react](https://github.com/usevowel/skills/tree/main/skills/vowel-react),\
      \ [vowel-vanilla](https://github.com/usevowel/skills/tree/main/skills/vowel-vanilla),\
      \ [vowel-webcomponent](https://github.com/usevowel/skills/tree/main/skills/vowel-webcomponent),\
      \ or [voweldocs](https://github.com/usevowel/skills/tree/main/skills/voweldocs)\
      \ — selected automatically based on your project type.\n\nDuring setup, vowelbot\
      \ creates an isolated **add-vowel** branch in your repository. All workflow\
      \ setup, integration logic, and voice agent changes are committed to this branch\
      \ only. When complete, it opens a pull request from the add-vowel branch to\
      \ your default branch for you to review and merge. Your existing branches and\
      \ work remain completely untouched until you choose to merge.\n\n### 3. Use\
      \ It (Later Runs)\n\n- **In an issue or PR:** Comment /vowelbot integrate (or\
      \ /vowelbot + your request)\n- **Manual run:** Actions → vowelbot integration\
      \ → Run workflow\n\nYour keys stay in your repo — vowelbot never sees them.\n\
      \n### GitHub Codespaces\n\nNo additional setup required — when the OpenCode\
      \ agent integrates vowel into your repository, a [GitHub Codespaces](https://github.com/codespaces/new?repo=usevowel/skills)\
      \ environment is automatically configured for testing.\n\nYou can also explore\
      \ the skills directly in GitHub Codespaces: [![Open in GitHub Codespaces](https://github.com/codespaces/badge.svg)](https://github.com/codespaces/new?repo=usevowel/skills)\n\
      \n## Troubleshooting\n\n| Issue | Solution |\n|-------|----------|\n| **Workflow\
      \ fails with \"no API key\"** | This should not happen — vowelbot uses free\
      \ [OpenCode](https://opencode.ai/) models by default. If you see this error,\
      \ it may be a temporary issue with the free model provider. Try running the\
      \ workflow again, or add an API key from Anthropic, OpenAI, or Groq as a fallback.\
      \ |\n| **Clicked integrate and workflow failed** | Go to Actions → vowelbot\
      \ integration → Run workflow to retry. Free models may occasionally be unavailable\
      \ during high demand — adding an API key ensures reliable access. |\n| **\"\
      Project not compatible\"** | Vowel supports React, vanilla JavaScript, and Web\
      \ Components only. iOS Swift, Android, Flutter, and other non-web frameworks\
      \ are not yet supported. |\n\n## Onboarding Flow\n\n[code example]\n\n## Architecture\n\
      \n[code example]\n\n### Key Architectural Principles\n\n1. **Branch-based onboarding\
      \ (pristine)**: All changes happen in an isolated add-vowel branch. Your existing\
      \ branches, default branch, and working code remain completely untouched. The\
      \ integration runs entirely within this branch, then opens a PR for your review.\
      \ Nothing changes in your repository until you explicitly merge.\n\n2. **Zero\
      \ key custody**: User API keys stay in their repo secrets. We only use GitHub\
      \ App credentials.\n\n3. **GitHub-native triggers**: After initial setup, /vowelbot\
      \ comments trigger Actions directly — no persistent infrastructure in the hot\
      \ path.\n\n## Reference\n\n- Watch the [vowelbot demo video](https://youtu.be/lgs5OecnABU)\
      \ for a visual walkthrough\n- Visit [add.vowel.to](https://add.vowel.to) to\
      \ start integrating"
    word_count: 728
    char_count: 5601
  voweldocs/architecture:
    title: Architecture
    description: null
    category: Voweldocs
    url_path: /voweldocs/architecture/
    content: "# Architecture\n\n## System Overview\n\n[code example]\n\n## Key Components\n\
      \n### VoiceLayout.vue\n\nCustom VitePress theme layout that:\n- Adds a \"voweldocs\"\
      \ button to the navbar\n- Shows voice configuration modal\n- Mounts the voice\
      \ agent widget\n- Handles configuration state\n\n### VoiceConfigModal.vue\n\n\
      Configuration UI supporting two modes:\n\n- **Hosted (SaaS)**: Uses appId from\
      \ [vowel.to](https://vowel.to) with hardcoded realtime URL\n- **Self-Hosted**:\
      \ Uses either:\n  - appId + url (manual configuration)\n  - JWT token with embedded\
      \ URL (from environment variable)\n\n![voweldocs Configuration Modal](/images/voweldocs-config.png)\n\
      \n### voice-client.ts\n\nCore initialization logic:\n- Reads credentials from\
      \ localStorage\n- Builds Vowel configuration based on mode\n- Registers documentation-specific\
      \ actions:\n  - searchKnowledgeBase - **RAG-powered semantic search** over docs\
      \ (Turso WASM)\n  - searchDocs - Trigger DocSearch\n  - getCurrentPageInfo -\
      \ Read page structure\n  - copyCodeExample - Copy code blocks\n  - jumpToSection\
      \ - Scroll to headings\n  - listSections - Enumerate page sections\n  - showRelatedPages\
      \ - Find related docs\n  - openRagDebugChat - Open debug panel to see STT/RAG\
      \ results\n\n### Routes Manifest\n\nThe generate-routes-plugin.ts Vite plugin\
      \ scans all markdown files at build time and generates routes-manifest.ts with\
      \ page paths and descriptions for voice navigation.\n\n### RAG Knowledge Base\
      \ (Turso WASM)\n\nPowered by Turso WASM plus Transformers.js query embeddings\
      \ in the browser:\n\n- **Local semantic search** using Transformers.js embeddings\n\
      - **Pre-built index** loaded from rag-index.yml (generated at build time via\
      \ bun run build:rag)\n- **Zero cloud dependencies** - all processing happens\
      \ client-side via WebAssembly\n- **Instant answers** - the AI searches your\
      \ docs before responding, ensuring factual, grounded answers\n- **Debug visibility**\
      \ - RAG debug chat shows exactly what the AI retrieved\n\n![RAG Files Structure](/images/voweldocs-rag-files.png)\n\
      \n## Agent Skills Reference\n\nImplementation details for agents working with\
      \ this codebase:\n\n- **voweldocs** (.agents/skills/voweldocs/) - VitePress/Vue\
      \ integration pattern, voice layout components\n- **rag-prebuild** (.agents/skills/rag-prebuild/)\
      \ - Pre-computed embedding generation with build-rag.py\n- **haven-local-rag**\
      \ (.agents/skills/haven-local-rag/) - Browser-based semantic search and local\
      \ RAG pipeline background"
    word_count: 304
    char_count: 2386
  voweldocs/configuration:
    title: Configuration
    description: null
    category: Voweldocs
    url_path: /voweldocs/configuration/
    content: '# Configuration


      The voweldocs configuration modal allows end users to enter their own vowel
      credentials to enable voice-powered navigation on your documentation site.


      ![voweldocs Configuration Modal](https://blog-assets.vowel.to/assets/voweldocs-config.png)


      ## Two Configuration Modes


      ### Pre-configured Mode (No User Input Required)


      If you provide credentials via environment variables at build time, the voice
      agent initializes automatically. Users can start speaking immediately without
      any configuration - the "voweldocs" button simply opens/closes the voice interface.


      **Environment variables for pre-configuration:**

      - VITE_VOWEL_APP_ID + VITE_VOWEL_URL (Hosted or Self-Hosted Manual)

      - VITE_VOWEL_JWT_TOKEN + VITE_VOWEL_USE_JWT=true (Self-Hosted JWT)


      This is ideal for:

      - SaaS documentation where you want zero-friction voice access

      - Internal documentation with a shared self-hosted instance

      - Any site where you want to provide voice out-of-the-box


      ### User-Configured Mode (Bring Your Own Credentials)


      If no credentials are pre-configured via environment variables, clicking the
      "voweldocs" button opens the configuration modal where users enter their own
      credentials:


      #### Hosted Mode


      For users connecting to the hosted vowel.to platform:


      1. Sign up at [vowel.to](https://vowel.to/dashboard) and create an app in the
      dashboard

      2. Copy the appId and paste it into the "App ID" field

      3. The realtime URL is automatically set to wss://realtime.vowel.to/v1

      4. Click "Save Configuration" to activate voice navigation


      #### Self-Hosted (Manual)


      For users running their own vowel infrastructure:


      1. Enter the appId from your self-hosted Core configuration

      2. Enter your custom realtime endpoint URL (e.g., wss://your-domain.com/realtime)

      3. Save to connect to your private instance


      #### Self-Hosted (JWT)


      For production self-hosted deployments using JWT authentication:


      1. Enable JWT mode to use a token with embedded URL

      2. Enter or paste a JWT token (can be pre-filled via VITE_VOWEL_JWT_TOKEN env
      var)

      3. The URL is extracted automatically from the JWT payload


      ::: info Storage

      Credentials are stored in browser localStorage (per-user, per-device). The voice
      agent initializes immediately after saving.

      :::


      ## Decision Tree


      When setting up voweldocs for your documentation project, use this decision
      tree to determine which credentials you need:


      [code example]


      ## Environment Variables


      Create a .env file (see .env.example):


      | Variable | Mode | Purpose |

      |----------|------|---------|

      | VITE_VOWEL_APP_ID | Hosted | Your app ID from vowel.to |

      | VITE_VOWEL_URL | Self-hosted | Your realtime endpoint (e.g., wss://your-instance.com/realtime)
      |

      | VITE_VOWEL_USE_JWT | Self-hosted | Set to true to enable JWT mode |

      | VITE_VOWEL_JWT_TOKEN | Self-hosted | JWT token with embedded URL |

      | VITE_VOWEL_DEBUG_RAG | Dev only | Set to true to enable RAG debug UI (shows
      STT transcripts + search results) |


      ## URL Resolution Priority (Self-Hosted)


      When using self-hosted mode, the realtime URL is resolved in this order:


      1. **JWT payload** (url, endpoint, or rtu claim) - Highest priority

      2. **Environment variable** (VITE_VOWEL_URL)

      3. **Fallback placeholder** - Only used if neither above is set'
    word_count: 449
    char_count: 3220
  voweldocs/index:
    title: Voweldocs
    description: null
    category: Getting Started
    url_path: /voweldocs/
    content: '# voweldocs


      Add voice-powered AI navigation to your documentation site. voweldocs is a reference
      implementation showing how to integrate the vowel client into any documentation
      platform.


      ## What is voweldocs?


      **voweldocs** enables users to:


      - **Navigate by voice** - "Take me to the installation guide"

      - **Ask questions with RAG** - "What is Vowel?" with answers grounded in your
      docs

      - **Interact with content** - "Copy the first code example"

      - **Search documentation** - "Search for adapters" using VitePress DocSearch


      ## Architecture Overview


      [code example]


      The system consists of UI components (VoiceLayout, VoiceConfigModal, VoiceAgent),
      core dependencies (Vowel SDK, routes manifest, localStorage), and a privacy-first
      RAG layer using Turso WASM with local query embeddings.


      ## Documentation Sections


      - [**Architecture**](./architecture) - System components, VoiceLayout, voice-client.ts,
      and RAG Knowledge Base

      - [**Configuration**](./configuration) - Decision tree for choosing hosted vs
      self-hosted, environment variables, URL resolution

      - [**RAG**](./rag) - Privacy-first retrieval-augmented generation with Turso
      WASM

      - [**Integration**](./integration) - Step-by-step guide to add voweldocs to
      your documentation site

