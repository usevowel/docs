  self-hosted/configuration:
    title: Configuration
    description: null
    category: Self Hosted
    url_path: /self-hosted/configuration/
    content: '# Self-Hosted Configuration


      Self-hosted deployments require configuration for tokens, providers, networking,
      and browser connectivity. This page documents all environment variables and
      configuration options for the self-hosted stack.


      ## Environment File Location


      The stack reads configuration from a stack.env file in the workspace root (one
      level up from the stack/ directory):


      [code example]


      ## Required Variables


      These variables must be set before starting the stack:


      | Variable | Description | Example |

      |----------|-------------|---------|

      | ENCRYPTION_KEY | 32+ character secret for encrypting stored API keys | abcd1234...
      (64 char hex) |

      | ENGINE_API_KEY | Server-side API key for engine authentication | my-secure-api-key
      |

      | JWT_SECRET | 32+ character secret for JWT token signing | my-jwt-secret-min-32-chars
      |

      | CORE_BOOTSTRAP_PUBLISHABLE_KEY | Publishable key for Core to auto-create on
      first boot | vkey_... (64 char hex) |

      | DEEPGRAM_API_KEY | Deepgram API key for STT and TTS | Get from [deepgram.com](https://deepgram.com)
      |

      | GROQ_API_KEY or OPENROUTER_API_KEY | LLM provider API key | Get from provider
      console |


      ### Generating Secure Keys


      Generate secure random keys for secrets:


      [code example]


      ## Provider Configuration


      ### LLM Provider


      Choose one LLM provider:


      [code example]


      **LLM Provider Variables:**


      | Variable | Default | Description |

      |----------|---------|-------------|

      | LLM_PROVIDER | openrouter | groq, openrouter, or openai-compatible |

      | GROQ_API_KEY | - | Groq API key |

      | GROQ_MODEL | openai/gpt-oss-20b | Groq model ID |

      | GROQ_WHISPER_MODEL | whisper-large-v3 | Groq Whisper model for STT |

      | OPENROUTER_API_KEY | - | OpenRouter API key |

      | OPENROUTER_MODEL | openrouter/healer-alpha | OpenRouter model ID |

      | OPENAI_COMPATIBLE_BASE_URL | http://host.docker.internal:8000/v1 | Base URL
      for compatible gateway |

      | OPENAI_COMPATIBLE_API_KEY | - | API key for compatible gateway |

      | OPENAI_COMPATIBLE_MODEL | gpt-4o-mini | Model ID for compatible gateway |


      ### STT/TTS Configuration


      The stack can keep credentials for multiple speech providers at once. Core app
      settings choose which configured provider each app should use, while engine
      env values remain stack defaults and fallbacks.


      [code example]


      **STT/TTS Variables:**


      | Variable | Default | Description |

      |----------|---------|-------------|

      | STT_PROVIDER | deepgram | Engine fallback/default STT provider |

      | DEFAULT_STT_PROVIDER | STT_PROVIDER | Core bootstrap/app default STT provider
      |

      | DEEPGRAM_STT_MODEL | nova-3 | Deepgram STT model |

      | DEEPGRAM_STT_LANGUAGE | en-US | STT language code |

      | TTS_PROVIDER | deepgram | Engine fallback/default TTS provider |

      | DEFAULT_TTS_PROVIDER | TTS_PROVIDER | Core bootstrap/app default TTS provider
      |

      | DEEPGRAM_TTS_MODEL | aura-2-thalia-en | Deepgram TTS voice model |

      | OPENAI_COMPATIBLE_BASE_URL | - | Base URL for an OpenAI-compatible audio service
      |

      | OPENAI_COMPATIBLE_API_KEY | - | API key for that audio service, if required
      |

      | CORE_ENABLE_DEV_VOICE_OVERRIDES | false | Allow hidden client _voiceConfig
      runtime overrides in Core |


      ### STT/TTS Provider Selection (Dev-Only)


      The ability to configure STT/TTS providers through the token system (via voiceConfig.stt
      and voiceConfig.tts in token requests) is a **development-only feature**. This
      follows the same pattern as LLM provider/model overrides:


      - **Development**: When CORE_ENABLE_DEV_VOICE_OVERRIDES=true (self-hosted Core)
      or VOWEL_ENABLE_DEV_VOICE_CONFIG_OVERRIDES=true (hosted platform), clients can
      override speech providers via token configuration

      - **Production**: Speech providers should be configured through app presets,
      not client token overrides. The token''s provider configuration is ignored in
      production - only preset-backed configuration is used


      This ensures consistent behavior across sessions and prevents configuration
      drift in production environments. The dev flags exist to allow rapid iteration
      during development without requiring preset changes.


      ### VAD Configuration


      Voice Activity Detection (VAD) detects when users start and stop speaking:


      [code example]


      **VAD Variables:**


      | Variable | Default | Description |

      |----------|---------|-------------|

      | VAD_PROVIDER | silero | VAD provider (silero or none) |

      | VAD_ENABLED | true | Enable server-side VAD |


      ## Bootstrap Configuration


      Core auto-creates an app and publishable API key on first boot using these variables:


      [code example]


      **Bootstrap Variables:**


      | Variable | Default | Description |

      |----------|---------|-------------|

      | CORE_BOOTSTRAP_APP_ID | default | App ID to create |

      | CORE_BOOTSTRAP_APP_NAME | Local Stack App | Display name |

      | CORE_BOOTSTRAP_APP_DESCRIPTION | Bootstrap app for the self-hosted Docker
      stack | Description |

      | CORE_BOOTSTRAP_API_KEY_LABEL | Local Stack Key | API key label |

      | CORE_BOOTSTRAP_SCOPES | mint_ephemeral | Comma-separated scopes |

      | CORE_BOOTSTRAP_ALLOWED_PROVIDERS | vowel-prime | Comma-separated allowed providers
      |

      | CORE_BOOTSTRAP_ALLOWED_ENDPOINT_PRESETS | staging | Comma-separated allowed
      presets |

      | CORE_BOOTSTRAP_DEFAULT_ENDPOINT_PRESET | staging | Default preset |

      | CORE_BOOTSTRAP_PUBLISHABLE_KEY | - | **Required.** Plaintext publishable key
      to seed |


      The publishable key is what client applications use to request tokens from Core.
      It should be a 64-character hex string prefixed with vkey_.


      ## Port Configuration


      Override default ports when they conflict with existing services:


      [code example]


      **Port Variables:**


      | Variable | Default | Description |

      |----------|---------|-------------|

      | CORE_HOST_PORT | 3000 | Host port for Core service |

      | ENGINE_HOST_PORT | 8787 | Host port for Engine service |


      After changing ports, update the Core environment to reflect the new engine
      port:


      [code example]


      ## Runtime Config Ownership


      The engine persists its runtime configuration as YAML at /app/data/config/runtime.yaml
      on the engine-data Docker volume. Environment variables in stack.env act as
      bootstrap defaults for the first boot and as fallback values when a key is missing
      from the YAML.


      ### HTTP Config Endpoints


      The engine exposes HTTP endpoints for inspecting and updating runtime configuration
      without rebuilding:


      | Endpoint | Method | Description |

      |----------|--------|-------------|

      | /config | GET | Retrieve current runtime config |

      | /config | PUT | Update runtime config |

      | /config/validate | POST | Validate a config change |

      | /config/reload | POST | Reload config from disk |

      | /presets | GET | List available presets |


      All config endpoints require the engine admin API key via Authorization: Bearer
      $.


      ### Example: Update Runtime Config


      [code example]


      ## Core Configuration Areas


      ### Provider Credentials


      Store all provider API keys in stack.env. Core encrypts provider keys before
      storing them in its SQLite database using the ENCRYPTION_KEY.


      ### Service URLs


      Core needs to know how to reach the engine:


      [code example]


      ### Token Issuance Settings


      Control who can request tokens and which providers they can use:


      - CORE_BOOTSTRAP_SCOPES: Controls API key capabilities (mint_ephemeral, mint_trusted_session)

      - CORE_BOOTSTRAP_ALLOWED_PROVIDERS: Which voice providers can be used

      - CORE_BOOTSTRAP_ALLOWED_ENDPOINT_PRESETS: Which endpoint presets are available


      ### Browser-Facing Origins


      For CORS, Core accepts requests from any origin by default in development. In
      production, configure your reverse proxy to handle CORS policy.


      ## Environment-Specific Configuration


      ### Development


      [code example]


      ### Production


      [code example]


      ## Security Guidance


      - Rotate provider secrets regularly (every 90 days recommended)

      - Scope credentials to the environments that need them

      - Terminate TLS before exposing browser-facing endpoints

      - Avoid embedding long-lived credentials in any client bundle

      - Never commit stack.env to version control

      - Use STACK_ENV_FILE to switch between environment files for different stages


      ## Complete Example Configuration


      [code example]'
