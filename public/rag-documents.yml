  self-hosted/testing:
    title: Testing
    description: null
    category: Self Hosted
    url_path: /self-hosted/testing/
    content: "# Testing\n\nThe self-hosted stack includes multiple testing capabilities\
      \ to verify functionality and validate voice agent behavior.\n\n## Quick Start\n\
      \nRun the built-in smoke test to verify your stack is working:\n\n[code example]\n\
      \nRun the full test suite with the Test Harness:\n\n[code example]\n\n## Smoke\
      \ Test\n\nThe smoke test (bun run stack:test) performs a quick health check\
      \ of your entire stack without requiring complex setup.\n\n### What It Tests\n\
      \n1. **Engine Health** - Verifies the engine responds to health checks\n2. **Core\
      \ Health** - Verifies the Core token service is running\n3. **Token Minting**\
      \ - Tests that Core can generate ephemeral tokens\n4. **WebSocket Connection**\
      \ - Validates tokens work for engine connections\n5. **Session Creation** -\
      \ Confirms the engine creates sessions properly\n\n### Running the Smoke Test\n\
      \n[code example]\n\nThe smoke test will report:\n- ✅ Engine health: OK - Engine\
      \ container is responsive\n- ✅ Core health: OK - Core container is responsive\n\
      - ✅ Token minted: <token_prefix>... - Token generation works\n- ✅ Connected\
      \ to WebSocket - WebSocket connection succeeds\n- ✅ Session created - Full flow\
      \ is working\n\n### Interpreting Results\n\n| Result | Meaning |\n|--------|---------|\n\
      | All checks pass | Stack is fully operational |\n| Engine/Core health fails\
      \ | Containers not running or not healthy |\n| Token minting fails | Check .env\
      \ configuration and API keys |\n| WebSocket/Session fails | Engine configuration\
      \ or provider issues |\n\n## Test Harness Framework\n\nThe stack includes a\
      \ sophisticated **Test Harness** in the Engine for automated end-to-end testing\
      \ of voice agent conversations.\n\n### Architecture\n\nThe Test Harness uses\
