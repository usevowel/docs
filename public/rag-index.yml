  text: "[Troubleshooting]\n\nerse proxy configuration:**\n   [code example]\n\n4.\
    \ **Verify proxy forwards Upgrade headers:**\n   [code example]\n\n### Common\
    \ Causes and Solutions\n\n| Symptom | Cause | Solution |\n|---------|-------|----------|\n\
    | bind: address already in use | Port conflict | Use CORE_HOST_PORT/ENGINE_HOST_PORT\
    \ to change ports |\n| WebSocket closes immediately | Proxy drops Upgrade | Configure\
    \ proxy to forward WebSocket headers |\n| 502 Bad Gateway | Proxy can't reach\
    \ service | Check service is running and proxy target is correct |\n| CORS errors\
    \ | Origin not allowed | Configure CORS in reverse proxy or Core |\n| SSL error\
    \ | TLS certificate issue | Verify certificate chain and domain match |\n\n##\
    \ Container Issues\n\n### Container Won't Start\n\n[code example]\n\n### Container\
    \ Exits Immediately\n\nCommon causes:\n- Missing required environment variables\n\
    - Invalid encryption key format\n- Database permission issues\n\nCheck logs:\n\
    [code example]\n\n### Volume Permission Issues\n\n[code example]\n\n## Bootstrap\
    \ Issues\n\n### App Not Created\n\nCheck bootstrap logs:\n[code example]\n\nExpected\
    \ output:\n[code example]\n\nIf bootstrap fails:\n1."
