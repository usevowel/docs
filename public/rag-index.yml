- id: guide/connection-models-7f7f4ff03336
  text: '[Connection Models]


    # Connection Models


    Use this page to choose how your application connects to vowel.


    ## Overview


    There are two primary ways to connect a client application:


    - **Token-based flow**: your app fetches a short-lived token from your own backend
    or token service and connects with that token. This is the recommended path for
    the current open-source launch.'
