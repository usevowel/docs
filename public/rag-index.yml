  text: '[Rag]


    s a complete RAG knowledge base including:

    - docs.json — chunked documentation content with metadata

    - embeddings.json — vector embeddings for semantic search

    - stats.json — index statistics for the VectorDB


    These files are served as static assets and loaded into Haven''s local VectorDB
    on page initialization.'
