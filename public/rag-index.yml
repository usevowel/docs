    # Next.js Integration


    Learn how to integrate Vowel with Next.js for voice-controlled navigation and
    page interaction.


    ## Overview


    Vowel provides dedicated helpers for Next.js:


    - **createNextJSAdapters** - Creates navigation and automation adapters for Next.'
