  text: '[Billing And Organizations]


    ude the hosted billing and organization surface.


    ## What This Page Will Cover Later


    When the hosted platform launches, this page will cover:


    - organizations and team structure

    - app ownership and collaboration

    - subscription tiers and billing flows

    - hosted usage visibility


    If you are self-hosting, see [Self-Hosted](/self-hosted/) instead.'
