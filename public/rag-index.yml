- id: guide/tanstack-router-2c872d10568b
  text: '[Tanstack Router]


    # TanStack Router Integration


    Learn how to integrate Vowel with TanStack Router for automatic route detection
    and voice-controlled navigation.


    ## Overview


    Vowel provides first-class support for TanStack Router with automatic route discovery.
    The createTanStackAdapters helper automatically extracts routes from your router
    configuration.


    ## Installation


