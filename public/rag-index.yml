  text: "[Web Component]\n\neb component for framework-agnostic integration.\n\n##\
    \ Overview\n\nVowel provides pre-built web components that work in any framework\
    \ or vanilla JavaScript:\n\n- **`** - Complete voice agent UI\n- **<vowel-microphone>**\
    \ - Standalone microphone button\n- **<vowel-floating-cursor>** - Visual automation\
    \ feedback\n- **<controlled-by-vowel-frame>** - Banner for controlled sites\n\n\
    ## Installation\n\n[code example]\n\n## Quick Start\n\n### Register Components\n\
    \n[code example]\n\nOr register individually:\n\n[code example]\n\n### Use in\
    \ HTML\n\n[code example]\n\n## Web Components\n\n### \n\nFloating microphone button\
    \ for voice interaction."
