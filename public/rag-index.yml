  text: '[React]


    Automatically sync context with the Vowel client. This hook updates the AI''s
    context whenever the provided value changes, making it easy to keep the AI aware
    of dynamic application state.


    [code example]


    **Parameters:**

    - context - Context object to sync (Record | null). Use null to clear context.'
