  text: '[Standalone Js]


    # Vanilla JavaScript Integration


    Learn how to use Vowel with vanilla JavaScript without any framework.


    ## Overview


    Vowel works perfectly with vanilla JavaScript, providing a simple API for voice-powered
    interactions in any web application.'
