  text: '[Trusted Server]


    a name, description, and JSON Schema parameters. When the LLM decides to call
    one of these tools, the engine forwards the call to your backend over the WebSocket
    instead of trying to execute it client-side.


    ### Scope Gating


    Trusted-server tokens require the mint_trusted_session scope on the API key. This
    is a separate scope from mint_ephemeral (used for browser tokens).'
