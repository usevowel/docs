  text: '[Connection Paradigms]


    ns your backend registers at token-issuance time. The engine forwards tool calls
    to your backend instead of executing them client-side.

    - **Scope gating** - only API keys with the mint_trusted_session scope can mint
    trusted-server tokens. This prevents accidental use by keys intended for browser
    flows.


    ### Flow


    1.'
