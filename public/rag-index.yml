  text: '[Self Hosted]


    # Self-Hosted


    Self-hosted deployment lets you run vowel on infrastructure you control.


    ::: warning Beta Release

    This open-source release is in beta. You may encounter rough edges, incomplete
    features, or breaking changes. We are actively reviewing and merging community
    PRs, but please expect some instability as we iterate toward a stable release.
    Your feedback and contributions are welcome.'
