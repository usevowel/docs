  text: '[Trusted Server]


    ction Paradigms](/recipes/connection-paradigms).


    ## What Is a Trusted Server Connection?


    A trusted server connection lets your backend participate directly in a voice
    session. Instead of a browser client, your backend opens the WebSocket, sends
    audio or text, and receives responses. The realtime engine can also forward tool
    calls to your backend for server-side execution.'
