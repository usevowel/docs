- id: guide/connection-models-252157f58aa9
  text: '[Connection Models]


    ls come from and who operates the token service.


    ## Token-Based Flow


    Use a token-based flow when you want your own backend to mint or broker session
    access.


    How it works:


    1. Your client requests a short-lived token from your backend.

    2. Your backend checks auth, policy, or session context.

    3. Your backend returns a token response to the client.

    4. The client uses tokenProvider to connect.'
