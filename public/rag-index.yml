- id: guide/getting-started-dec38edb83c8
  text: '[Getting Started]


    # Getting Started


    Welcome to vowel. This guide helps you add voice-powered interactions to a web
    application with @vowel.to/client.


    ## What is Vowel?


    Vowel is a client SDK for voice-powered web experiences. For the initial open-source
    launch, the primary path is a token-based connection flow backed by the self-hosted
    stack. Hosted platform flows are coming soon.'
