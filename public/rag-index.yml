  text: '[Vowelbot]


    epo you want to integrate vowel into.


    That''s it. The workflow is added to your repo, the first integration runs automatically,
    and OpenCode opens a PR with voice agent changes tailored to your stack (React,
    vanilla JS, or <vowel-voice-widget>). Everything runs in one go — no manual re-run
    needed.


    **Your existing code stays untouched.'
