  text: '[Trusted Server]


    y is compromised, revoke it and create a new one.

    - **Validate tool inputs.** The engine forwards tool calls as-is. Your backend
    should validate arguments before executing.

    - **Log session lifecycle.** Track token minting, WebSocket connections, and tool-call
    results for debugging and auditing.


    ## Troubleshooting


    ### 403 Forbidden


    The API key does not carry the mint_trusted_session scope.'
