- id: recipes/custom-actions-7c2699e7beab
  text: '[Custom Actions]


    sent to the server during session initialization. Actions registered after startSession()
    are not sent to the AI and will never be called.


    **Best Practice:** Always register all actions immediately after creating the
    Vowel client and before calling startSession().


    ## Overview


    Custom actions extend your voice agent with business-specific functionality.'
