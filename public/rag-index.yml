  text: '[Apps And Management]


    app-management experience is not available yet.


    ## What This Page Will Cover Later


    When the hosted platform launches, this page will cover:


    - app creation

    - routes, actions, and behavior configuration

    - voice and instruction settings

    - testing and debugging in the hosted control plane

    - how hosted app configuration connects to appId usage in the client SDK


    ## Related Docs


    - [Client Getting Started](/guide/getting-started)

    - [Connection Models](/guide/connection-models)

    - [Self-Hosted](/self-hosted/)

    - [Billing & Organizations](.'
