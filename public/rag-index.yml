- id: self-hosted/quickstart-1d4ff6f0bf4a
  text: '[Quickstart]


    # Quickstart


    Complete walkthrough from clone to working voice demo.


    ## Prerequisites


    Before starting, ensure you have:


    - [Bun](https://bun.sh) installed (recommended) or Node.js with npm/yarn

    - [Docker](https://docker.com) and Docker Compose

    - API keys from [Deepgram](https://deepgram.com) (speech-to-text) and either [Groq](https://groq.com)
    or [OpenRouter](https://openrouter.'
