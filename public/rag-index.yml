    :::


    ## Decision Tree


    When setting up voweldocs for your documentation project, use this decision tree
    to determine which credentials you need:


    [code example]


    ## Environment Variables


    Create a .env file (see .env.example):


    | Variable | Mode | Purpose |

    |----------|------|---------|

    | VITE_VOWEL_APP_ID | Hosted | Your app ID from vowel.'
