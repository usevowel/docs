    ### Automation Adapter


    Provides voice-controlled page interaction:


    [code example]


    When provided, automatically registers these actions:

    - search_page_elements

    - get_page_snapshot

    - click_element

    - type_into_element

    - focus_element

    - scroll_to_element

    - press_key`


    See [Adapters Guide](./adapters) for detailed information.'
