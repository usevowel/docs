  text: "[Quickstart]\n\n\"Local Stack App\")\n   - Save to create the app\n3. Create\
    \ a publishable key:\n   - Click **\"Manage keys\"** on your new app\n   - Click\
    \ **\"Create key\"**\n   - Add a label for the key\n   - Select **\"Generate session\
    \ tokens\"** scope\n   - Select **\"Vowel Engine\"** as an allowed provider\n\
    \   - Click **Create**\n4. Copy the key (starts with vkey_) - you'll need it for\
    \ the demo configuration\n5."
