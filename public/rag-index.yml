  text: '[Trusted Server]


    is hit.

    - Look for error events on the WebSocket. The engine sends error events before
    closing.


    ## Reference Implementation


    If you already use a server-issued token flow for browser clients, the token-minting
    step is almost identical for trusted-server connections. The main difference is
    that your backend keeps the WebSocket open itself and handles forwarded tool calls
    directly.'
