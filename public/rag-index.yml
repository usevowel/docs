  text: '[Quickstart]


    de example]


    Open the provided localhost URL (e.g., http://localhost:3902) in your browser.
    Click the microphone and speak to test real-time voice interaction with the demo
    e-commerce application.


    ## Next Steps


    - **[Architecture](./architecture)** - Understand how the components work together

    - **[Configuration](./configuration)** - Complete environment variable reference

    - **[Core](.'
