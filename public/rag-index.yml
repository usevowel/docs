  text: '[Testing]


    end-to-end testing of voice agent conversations.


    ### Architecture


    The Test Harness uses an **LLM-powered Test Driver** that simulates a human user
    conducting conversations with your voice agent:


    [code example]


    **Components:**


    - **TestDriver**: LLM agent that generates realistic user messages and evaluates
    responses

    - **TestHarness**: Orchestrates the conversation, manages WebSocket connection,
    validates tool calls

    - **EngineConnection**: Handles WebSocket communication with the engine

    - **Scenarios**: Pre-defined test cases with objectives and expected tool calls


    ### Key Features


    - **Automated Conversation Flow**: The TestDriver carries natural conversations
    toward test objectives

    - **Tool Call Validation**: Verifies the agent uses the right tools with correct
    arguments

    - **Mock Tool Results**: Returns realistic mock data so conversations can continue

    - **Detailed Logging**: Generates timestamped Markdown logs of every test run

    - **Timeout Handling**: Gracefully handles slow responses or connection issues

    - **Retry Logic**: Automatic retry with exponential backoff for rate-limited LLM
    calls


    ## Demo Test Scenarios


    The Test Harness includes four built-in scenarios matching the demo application''s
    tools:


    ### 1.'
