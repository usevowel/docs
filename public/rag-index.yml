  text: "[Dynamic Context]\n\nxt is stored in the client during construction\n2. When\
    \ startSession() is called, the context is automatically included in the initial\
    \ system instructions\n3. The context is stringified and wrapped in [code example]\n\
    <context>\n\n[code example]typescript\n// Product page\nfunction showProductPage(productId:\
    \ string) {\n  const product = getProduct(productId);\n  \n  vowel."
