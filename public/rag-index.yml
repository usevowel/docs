- id: recipes/dynamic-context-f193370bc727
  text: '[Dynamic Context]


    # Dynamic Context


    Learn how to dynamically update the AI''s context during a voice session to keep
    it aware of current application state.


    ## Overview


    Dynamic context allows you to update the AI''s understanding of the current application
    state in real-time. The context object is stringified and appended to the system
    prompt, enabling the AI to provide more relevant and contextual responses.'
