  text: "[Troubleshooting]\n\nmicrophone availability:**\n   [code example]\n\n4.\
    \ **Check browser console for errors:**\n   - Look for NotAllowedError (permission\
    \ denied)\n   - Look for NotFoundError (no microphone)\n   - Look for WebSocket\
    \ connection errors\n\n### Common Causes and Solutions\n\n| Symptom | Cause |\
    \ Solution |\n|---------|-------|----------|\n| NotAllowedError | Permission denied\
    \ | Grant microphone permission in browser settings |\n| NotFoundError | No microphone\
    \ detected | Connect microphone and refresh |\n| Silence after connecting | VAD\
    \ not detecting speech | Check VAD_ENABLED=true and speak clearly |\n| No audio\
    \ output | TTS misconfigured | Verify DEEPGRAM_API_KEY and TTS model |\n\n## Provider\
    \ Misconfiguration\n\n### Diagnostic Steps\n\n1."
