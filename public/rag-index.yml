  text: '[Trusted Server]


    ation by sending text messages or audio buffers.


    [code example]


    ## Security Checklist


    - **Never expose trusted-server tokens in browser code.** They are for backend
    use only.

    - **Use separate API keys** for trusted-server and browser token minting. The
    scope separation exists for a reason.

    - **Rotate keys periodically.** If a key is compromised, revoke it and create
    a new one.'
