  text: '[Trusted Server]


    ique string that identifies your backend service. The engine logs it, uses it
    for analytics, and includes it in tool-call routing. Pick something descriptive,
    like order-service or ci-test-runner.


    ### serverTools


    Tool definitions you declare at token-issuance time. Each tool has a name, description,
    and JSON Schema parameters.'
