  text: '[Event Notifications]


    otifications** - Test with actual voice output

    8. **Consider Timing** - Don''t interrupt important user actions


    ## When to Use Event Notifications


    **Good Use Cases:**

    - ✅ Order confirmations

    - ✅ Timer/alarm expiry

    - ✅ Important system alerts

    - ✅ New message arrivals

    - ✅ Task completions

    - ✅ Status changes


    **Avoid:**

    - ❌ Every button click

    - ❌ Frequent updates (use debouncing)

    - ❌ Non-critical information

    - ❌ During user speech input


    ## Related


    - [Vowel Client](.'
