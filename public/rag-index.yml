  text: '[Speaking State]


    # Speaking State Tracking Recipe


    Advanced patterns for tracking and responding to voice activity states.


    ## Overview


    Vowel provides real-time state tracking for user speech, AI thinking, and AI speech.
    This recipe covers patterns for building responsive UIs and logic based on voice
    activity.'
