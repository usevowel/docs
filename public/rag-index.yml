  text: '[Vowelbot]


    ted branch, leaving your existing work pristine.


    ## Supported Projects


    - **Supported:** React, vanilla JavaScript, Web Components (web projects only)

    - **Not yet supported:** iOS Swift, Android, Flutter, and other non-web frameworks


